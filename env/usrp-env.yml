# Single Miniconda environment that can run ALL FOUR repos:
#   * USRP / GNU Radio (GRC) work + the LRLocal-V2 Python branch
#   * FT232_SCAN_IO (pyftdi + libusb)
#   * RTK_dev_for_cm-loc (pyserial)
#
# FT232 and RTK ALSO have their own direct venvs (~/venvs/ft232, ~/venvs/rtk);
# this env duplicates their deps so either route works (Yi's request 2026-06-03).
#
# UHD is pinned to 4.9.x to match what the USRP_study_yishen host apps were
# verified against (00-/01-/11- run-steps record UHD 4.9.0.0 under radioconda).
# If conda-forge cannot solve the pin on this machine, 10-usrp-conda-env.sh
# falls back to an unpinned uhd and prints a note.
name: usrp
channels:
  - conda-forge
  - nodefaults        # don't touch Anaconda's defaults channels (avoids their ToS gate)
dependencies:
  # --- SDR runtime: UHD (driver + Python bindings) and GNU Radio (+ GRC, gr-uhd)
  - uhd=4.9
  - gnuradio          # metapackage: pulls gnuradio-core, grc, gnuradio-uhd, etc.
  # --- C++ build toolchain for the multi_usrp host apps (00-/01-/11-/20-/30-/31-)
  - cmake
  - make
  - ninja
  - pkg-config
  - clang_osx-arm64
  - clangxx_osx-arm64
  - libboost-devel    # Boost program_options (headers + lib) for the host apps
  - pybind11          # needed to build OOT GNU Radio modules (e.g. gr-filerepeater, step 70)
  # --- Scientific Python: USRP analysis scripts + LRLocal-V2 03- Python branch
  - numpy
  - scipy
  - matplotlib
  - jupyter
  - pandas
  - tqdm
  - tmux              # detached sessions for field-jobs.sh (survive SSH disconnect)
  # --- FT232_SCAN_IO: FT232H scan-chain host driver
  - pyftdi
  - libusb            # USB backend pyftdi/pyusb need (conda-forge build)
  # --- RTK_dev_for_cm-loc: u-blox RELPOSNED serial monitor
  - pyserial
  # NOTE: SCAN_sourcemeter (Keithley 2401 over Keysight 82357B GPIB) was removed —
  # the 82357B has no Apple-Silicon/macOS driver (NI kexts are x86_64-only; NI-VISA
  # dropped GPIB). See RUNBOOK. Revisit only via a Prologix/RS-232 (serial) path.
  # --- Saleae Logic analyzer automation (pip-only; drives the Logic 2 desktop app)
  - pip
  - pip:
    - logic2-automation
